model:
  model_name: "/content/qwen1_5b"
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  use_flash_attention: false        # T4 (Turing) 不支持 flash attention 2

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

data:
  dataset_name: "argilla/ultrafeedback-binarized-preferences-cleaned"
  max_prompt_length: 256
  max_length: 512
  val_ratio: 0.05
  min_margin: 0.0
  max_samples: 10000
  seed: 42

training:
  output_dir: "/content/drive/MyDrive/gadpo_outputs/sft_qwen_1_5b"
  num_train_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 16    # effective batch = 32
  learning_rate: 5.0e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  bf16: true
  gradient_checkpointing: true
  max_grad_norm: 1.0
  logging_steps: 10
  save_steps: 200
  eval_steps: 200
  seed: 42
  report_to: "none"
  run_name: "sft-qwen-1.5b"
